<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>متجر اللحوم</title>

<style>
body{
    font-family: Tahoma, sans-serif;
    background:#f8f8f8;
    margin:0;
}

header{
    background:#8B0000;
    color:white;
    text-align:center;
    padding:20px;
}

.products{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    padding:20px;
}

.product{
    background:white;
    border-radius:10px;
    padding:15px;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
    text-align:center;
}

.product img{
    width:100%;
    height:200px;
    object-fit:cover;
    border-radius:8px;
}

.price{
    color:#8B0000;
    font-size:22px;
    font-weight:bold;
}

.order{
    background:white;
    margin:20px;
    padding:20px;
    border-radius:10px;
}

input,textarea{
    width:100%;
    padding:10px;
    margin-top:10px;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    background:#25D366;
    color:white;
    border:none;
    padding:12px 20px;
    margin-top:15px;
    border-radius:5px;
    cursor:pointer;
    font-size:16px;
}
</style>
</head>

<body>

<header>
    <h1>لحوم ومجمدات الجودة</h1>
    <p>أجود أنواع اللحوم ومنتجات العيد</p>
</header>

<section class="products">

<div class="product">
    <img src="https://via.placeholder.com/300x200" alt="">
    <h3>كفتة جاهزة</h3>
    <p class="price">220 جنيه / كيلو</p>
</div>

<div class="product">
    <img src="https://via.placeholder.com/300x200" alt="">
    <h3>سجق بلدي</h3>
    <p class="price">190 جنيه / كيلو</p>
</div>

<div class="product">
    <img src="https://via.placeholder.com/300x200" alt="">
    <h3>ممبار فاضي</h3>
    <p class="price">130 جنيه / كيلو</p>
</div>

</section>

<section class="order">
    <h2>اطلب الآن</h2>

    <input type="text" id="name" placeholder="الاسم">

    <input type="text" id="phone" placeholder="رقم الهاتف">

    <textarea id="order" rows="5" placeholder="اكتب طلبك هنا"></textarea>

    <button onclick="sendOrder()">إرسال الطلب</button>
</section>

<script>
function sendOrder(){

let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;
let order=document.getElementById("order").value;

let message=
طلب جديد%0A
الاسم: ${name}%0A
الهاتف: ${phone}%0A
الطلب: ${order};

window.open(
https://wa.me/201039139270?text=${message},
'_blank'
);

}
</script>

</body>
</html>
